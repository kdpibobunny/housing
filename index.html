<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>徐汇候选档案</title>
<style>
  :root{
    --paper:#E7E4DA; --paper-dim:#DAD6C9; --paper-card:#F4F1E8;
    --ink:#23271F; --ink-soft:#5B5A4E; --line-grey:#B7B2A0;
    --copper:#8C5A36; --copper-soft:#C99B6E; --jade:#2F5D4E; --jade-soft:#DCE7E1;
    --brick:#AE4A30; --brick-soft:#F1DCD3; --shadow:rgba(35,39,31,0.16);
    --font-display:"Songti SC","STSong","SimSun",serif;
    --font-body:"PingFang SC","Microsoft YaHei",-apple-system,"Helvetica Neue",Arial,sans-serif;
    --font-mono:"SF Mono","Menlo","Consolas",monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);}
  #app{max-width:1180px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .ledger-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;padding:20px 28px 16px;border-bottom:1px solid var(--line-grey);}
  .title-block .stamp{font-family:var(--font-display);font-size:23px;font-weight:700;letter-spacing:0.5px;display:block;}
  .title-block .subtitle{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .chip-group{display:flex;gap:6px;}
  .chip{font-family:var(--font-body);font-size:13px;padding:6px 14px;border-radius:999px;border:1px solid var(--line-grey);background:transparent;color:var(--ink-soft);cursor:pointer;transition:background .15s ease,color .15s ease,border-color .15s ease;}
  .chip.active{background:var(--jade);color:#fff;border-color:var(--jade);}
  .sort-select{font-family:var(--font-body);font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--line-grey);background:var(--paper-card);color:var(--ink);}
  .body-grid{display:flex;flex:1;align-items:flex-start;}
  .map-pane{flex:1.4;position:relative;border-right:1px solid var(--line-grey);padding:18px;}
  .map-caption{font-size:11px;color:var(--ink-soft);font-family:var(--font-mono);letter-spacing:0.5px;margin-bottom:8px;}
  #mapSvg{width:100%;aspect-ratio:600/380;display:block;border-radius:10px;background:var(--paper-dim);}
  .map-bg{fill:var(--paper-dim);}
  .work-dot{fill:#C62828;stroke:#fff;stroke-width:2;}
  .work-label{font-family:var(--font-body);font-size:9px;fill:#C62828;font-weight:700;}
  .pin-group{cursor:pointer;}
  .pin-circle{stroke:#fff;stroke-width:2;fill:var(--jade);transition:stroke .15s ease,stroke-width .15s ease;}
  .pin-group[data-type="合租·独卫"] .pin-circle{fill:var(--brick);}
  .pin-group.pin-dim{opacity:0.28;}
  .pin-group.pin-selected .pin-circle{stroke:var(--ink);stroke-width:3;filter:drop-shadow(0 2px 4px var(--shadow));}
  .pin-text{font-family:var(--font-display);font-size:11px;fill:#fff;font-weight:700;pointer-events:none;}
  .list-pane{flex:1;padding:16px 20px;max-height:640px;overflow-y:auto;}
  .empty-state{text-align:center;color:var(--ink-soft);padding:48px 14px;font-size:13px;line-height:1.7;}
  .entry-card{border:1px solid var(--line-grey);background:var(--paper-card);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .15s ease,box-shadow .15s ease;}
  .entry-card.selected{border-color:var(--copper);box-shadow:0 0 0 2px var(--copper-soft);}
  .entry-head{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;}
  .badge{font-family:var(--font-display);font-weight:700;width:26px;height:26px;border-radius:50%;background:var(--copper);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
  .entry-name-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
  .entry-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .visited-tag{font-size:10px;padding:2px 7px;border-radius:999px;background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;white-space:nowrap;flex-shrink:0;}
  .type-tag{font-size:11px;padding:2px 9px;border-radius:999px;flex-shrink:0;}
  .type-tag.whole{background:var(--jade-soft);color:var(--jade);}
  .type-tag.shared{background:var(--brick-soft);color:var(--brick);}
  .entry-price{font-family:var(--font-mono);font-weight:700;font-size:14px;color:var(--jade);flex-shrink:0;}
  .entry-fee{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);flex-shrink:0;text-align:right;}
  .entry-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
  .entry-body{padding:0 12px 14px 48px;font-size:13px;color:var(--ink-soft);}
  .photo-grid{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .photo-thumb{width:80px;height:60px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--line-grey);transition:opacity .15s;}
  .photo-thumb:hover{opacity:0.8;}
  /* Lightbox */
  .lb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
  .lb-overlay.open{display:flex;}
  .lb-img{max-width:92vw;max-height:80vh;border-radius:10px;object-fit:contain;box-shadow:0 4px 32px rgba(0,0,0,0.5);}
  .lb-close{position:absolute;top:18px;right:24px;font-size:28px;color:#fff;cursor:pointer;line-height:1;background:none;border:none;}
  .lb-nav{display:flex;gap:16px;}
  .lb-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:6px;padding:6px 18px;font-size:14px;cursor:pointer;}
  .lb-btn:hover{background:rgba(255,255,255,0.28);}
  .entry-row{display:flex;gap:8px;margin:4px 0;}
  .entry-row .label{width:54px;flex-shrink:0;color:var(--ink-soft);}
  .entry-row a{color:var(--copper);}
  .stars{font-family:var(--font-mono);color:var(--copper);letter-spacing:1px;}
  .stats-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 28px;border-top:1px solid var(--line-grey);font-size:13px;color:var(--ink-soft);font-family:var(--font-mono);flex-wrap:wrap;}
  button:focus-visible,.chip:focus-visible{outline:2px solid var(--copper);outline-offset:2px;}
  @media (max-width:760px){
    .body-grid{flex-direction:column;}
    .map-pane{border-right:none;border-bottom:1px solid var(--line-grey);flex:none;width:100%;}
    .list-pane{max-height:none;width:100%;flex:none;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important;}}
</style>
</head>
<body>
<div id="app">
  <header class="ledger-bar">
    <div class="title-block">
      <span class="stamp">徐汇候选档案</span>

    <div class="controls">
      <div class="chip-group" id="typeFilters">
        <button class="chip active" data-type="all">全部</button>
        <button class="chip" data-type="整租">整租</button>
        <button class="chip" data-type="合租·独卫">合租·独卫</button>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="price-asc" selected>价格 ↑</option>
        <option value="price-desc">价格 ↓</option>
        <option value="rating-desc">评分 ↓</option>
      </select>
    </div>
  </header>
  <main class="body-grid">

      g.setAttribute("class","pin-group"+(visible[l.id]?"":" pin-dim")+(l.id===selectedId?" pin-selected":""));
      g.setAttribute("data-type", l.type);
      g.setAttribute("transform","translate("+cx+","+cy+")");
      g.innerHTML = '<circle class="pin-circle" r="12"></circle><text class="pin-text" text-anchor="middle" dy="4">'+escapeHtml(String(l.fileNo).padStart(2,"0"))+"</text>";
      g.addEventListener("click", function(){ handleSelect(l.id); });
      pinsLayer.appendChild(g);
    });
  }
  function cardHTML(l){
    var expanded = l.id===selectedId;
    var typeClass = l.type==="整租" ? "whole" : "shared";
    var rating = l.rating||0;
    var stars = "★".repeat(rating)+"☆".repeat(5-rating);
    var html = '<div class="entry-card '+(expanded?"expanded selected":"")+'">';
    html += '<div class="entry-head" data-head="'+l.id+'">';
    html += '<div class="badge">'+escapeHtml(String(l.fileNo).padStart(2,"0"))+"</div>";
    html += '<div class="entry-name-wrap"><div class="entry-name">'+escapeHtml(l.name)+"</div>";
    if(l.visited) html += '<span class="visited-tag">✓ 已看房</span>';
    html += "</div>";
    html += '<span class="type-tag '+typeClass+'">'+escapeHtml(l.type)+"</span>";
    html += '<div class="entry-meta"><div class="entry-price">¥'+escapeHtml(String(l.price))+'</div><div class="entry-fee">服务费 '+escapeHtml(l.fee||"无")+"</div></div></div>";
    if(expanded){
      html += '<div class="entry-body">';
      // 多图缩略图
      if(l.photos && l.photos.length){
        html += '<div class="photo-grid">';
        l.photos.forEach(function(url, idx){
          html += '<img class="photo-thumb" src="'+escapeHtml(url)+'" alt="照片'+(idx+1)+'" data-photos="'+escapeHtml(JSON.stringify(l.photos))+'" data-idx="'+idx+'"/>';
        });
        html += "</div>";
      }
      html += '<div class="entry-row"><span class="label">板块</span><span>'+escapeHtml(l.subarea||"-")+"</span></div>";
      html += '<div class="entry-row"><span class="label">面积</span><span>'+(l.area?escapeHtml(String(l.area))+"㎡":"-")+"</span></div>";
      html += '<div class="entry-row"><span class="label">地铁</span><span>'+escapeHtml(l.metro||"-")+"</span></div>";
      html += '<div class="entry-row"><span class="label">来源</span><span>'+escapeHtml(l.platform||"-")+"</span></div>";
      html += '<div class="entry-row"><span class="label">联系</span><span>'+escapeHtml(l.contact||"-")+"</span></div>";
      html += '<div class="entry-row"><span class="label">评分</span><span class="stars">'+stars+"</span></div>";
      html += '<div class="entry-row"><span class="label">备注</span><span>'+escapeHtml(l.note||"-")+"</span></div>";
      if(l.link) html += '<div class="entry-row"><span class="label">链接</span><a href="'+escapeHtml(l.link)+'" target="_blank" rel="noopener noreferrer">查看原始房源</a></div>';
      html += "</div>";
    }
    html += "</div>";
    return html;
  }

  // 灯箱逻辑
  var lbOverlay = document.getElementById("lbOverlay");
  var lbImg     = document.getElementById("lbImg");
  var lbPhotos  = [], lbIdx = 0;
  function openLb(photos, idx){
    lbPhotos = photos; lbIdx = idx;
    lbImg.src = lbPhotos[lbIdx];
    lbOverlay.classList.add("open");
  }
  document.getElementById("lbClose").addEventListener("click", function(){ lbOverlay.classList.remove("open"); });
  lbOverlay.addEventListener("click", function(e){ if(e.target===lbOverlay) lbOverlay.classList.remove("open"); });
  document.getElementById("lbPrev").addEventListener("click", function(){ lbIdx=(lbIdx-1+lbPhotos.length)%lbPhotos.length; lbImg.src=lbPhotos[lbIdx]; });
  document.getElementById("lbNext").addEventListener("click", function(){ lbIdx=(lbIdx+1)%lbPhotos.length; lbImg.src=lbPhotos[lbIdx]; });
  document.addEventListener("keydown", function(e){
    if(!lbOverlay.classList.contains("open")) return;
    if(e.key==="Escape") lbOverlay.classList.remove("open");
    if(e.key==="ArrowLeft"){ lbIdx=(lbIdx-1+lbPhotos.length)%lbPhotos.length; lbImg.src=lbPhotos[lbIdx]; }
    if(e.key==="ArrowRight"){ lbIdx=(lbIdx+1)%lbPhotos.length; lbImg.src=lbPhotos[lbIdx]; }
  });
  document.addEventListener("click", function(e){
    if(e.target.classList.contains("photo-thumb")){
      var photos = JSON.parse(e.target.dataset.photos);
      var idx    = parseInt(e.target.dataset.idx, 10);
      openLb(photos, idx);
    }
  });
  function renderList(){
    var filtered = getFiltered();
    if(filtered.length===0){
      listPane.innerHTML = '<div class="empty-state">Excel 里还没有有效的房源记录。<br/>填好"小区/地址名称"和"价格"两列后重新运行脚本即可。</div>';
      return;
    }
    listPane.innerHTML = filtered.map(cardHTML).join("");
    filtered.forEach(function(l){
      var head = listPane.querySelector('[data-head="'+l.id+'"]');
      if(head) head.addEventListener("click", function(){ handleSelect(l.id); });
    });
  }
  function renderStats(){
    var filtered = getFiltered();
    var avg = filtered.length ? Math.round(filtered.reduce(function(s,l){return s+Number(l.price||0);},0)/filtered.length) : 0;
    document.getElementById("statsText").textContent = "共 "+filtered.length+" 套 · 均价 ¥"+avg;
  }
  function handleSelect(id){
    selectedId = (selectedId===id) ? null : id;
    render();
    requestAnimationFrame(function(){
      var card = listPane.querySelector(".entry-card.selected");
      if(card) card.scrollIntoView({behavior:"smooth", block:"nearest"});
    });
  }
  document.querySelectorAll("#typeFilters .chip").forEach(function(btn){
    btn.addEventListener("click", function(){
      document.querySelectorAll("#typeFilters .chip").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      typeFilter = btn.dataset.type;
      render();
    });
  });
  document.getElementById("sortSelect").addEventListener("change", function(e){ sortBy = e.target.value; render(); });
  render();
})();
</script>
</body>
</html>
